<style>
/* ── RELATORIO SPECIFIC ── */
.toolbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:22px;gap:10px;flex-wrap:wrap;animation:fadeUp 0.4s ease both}
.date-nav{display:flex;align-items:center;gap:6px}
.dnavbtn{width:28px;height:28px;border-radius:8px;background:var(--card);border:1px solid var(--border);color:var(--ink3);cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center;transition:all 0.15s}
.dnavbtn:hover{background:var(--card2);color:var(--ink)}
.dnavbtn:active{transform:scale(0.9)}
.dlabel{font-family:'Cascadia Code',Consolas,'Courier New',monospace;font-size:12px;font-weight:500;color:var(--ink);padding:5px 12px;min-width:90px;text-align:center;background:var(--card);border:1px solid var(--border);border-radius:8px}
input[type=date].dpick{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:4px 8px;color:var(--ink);font-size:11px;font-family:'Cascadia Code',Consolas,'Courier New',monospace;cursor:pointer;outline:none}
.today-btn{padding:5px 12px;border-radius:8px;background:var(--green-lt);border:1px solid rgba(37,211,102,0.25);color:var(--green);font-size:11px;font-weight:600;cursor:pointer;transition:all 0.15s}
.today-btn:hover{background:var(--green);color:#111b21;border-color:var(--green)}

.section{background:var(--card);border:1px solid var(--border);border-radius:var(--r-lg);margin-bottom:14px;overflow:hidden;box-shadow:var(--shadow);animation:fadeUp 0.4s ease both}
.section-head{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--border);background:var(--card2)}
.section-num{width:26px;height:26px;border-radius:8px;background:var(--green-lt);border:1px solid rgba(37,211,102,0.2);display:flex;align-items:center;justify-content:center;font-family:'Cascadia Code',Consolas,'Courier New',monospace;font-size:11px;font-weight:700;color:var(--green);flex-shrink:0}
.section-title{font-size:13px;font-weight:700;color:var(--ink);margin-left:10px}
.section-body{padding:18px 20px}

/* Exec grid */
.exec-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:14px}
.exec-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:14px;transition:box-shadow 0.2s,border-color 0.2s}
.exec-card:hover{box-shadow:0 12px 48px rgba(0,0,0,0.45);border-color:var(--border2)}
.exec-card-top{font-size:9px;font-weight:700;letter-spacing:0.8px;text-transform:uppercase;color:var(--ink4);margin-bottom:8px}
.exec-card-val{font-family:'Cascadia Code',Consolas,'Courier New',monospace;font-size:26px;font-weight:700;color:var(--ink);letter-spacing:-1px;line-height:1}
.exec-card-pct{font-family:'Cascadia Code',Consolas,'Courier New',monospace;font-size:12px;font-weight:600;margin-top:3px}
.exec-card-lbl{font-size:10px;color:var(--ink4);margin-top:4px}
.exec-card.fin .exec-card-pct{color:var(--green)}
.exec-card.and .exec-card-pct{color:var(--amber)}
.exec-card.sem .exec-card-pct{color:var(--rose)}
.exec-progress{display:flex;height:5px;border-radius:99px;overflow:hidden;background:var(--border);margin-bottom:14px}
.ep-seg{height:100%;transition:width 0.6s ease}
.ep-seg.fin{background:var(--green)}
.ep-seg.and{background:var(--amber)}
.ep-seg.sem{background:var(--rose)}
.tma-card{display:flex;align-items:center;gap:12px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:14px}
.tma-icon{font-size:20px;flex-shrink:0}
.tma-val{font-family:'Cascadia Code',Consolas,'Courier New',monospace;font-size:22px;font-weight:700;color:var(--ink);letter-spacing:-0.5px;line-height:1}
.tma-lbl{font-size:10px;color:var(--ink4);margin-top:3px}

/* Horários */
.hor-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
.hor-card{display:flex;align-items:flex-start;gap:10px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:14px}
.hor-icon{font-size:16px;flex-shrink:0;margin-top:2px}
.hor-icon svg{width:16px;height:16px;stroke:var(--ink3)}
.hor-lbl{font-size:10px;color:var(--ink4);margin-bottom:5px}
.hor-time{font-family:'Cascadia Code',Consolas,'Courier New',monospace;font-size:18px;font-weight:700;color:var(--ink)}
.hor-nome{font-size:11px;color:var(--ink3);margin-top:3px}

/* Reclamações */
.recl-empty{display:flex;align-items:center;gap:10px;padding:16px;background:var(--green-lt);border-radius:var(--r)}
.recl-empty-icon{font-size:16px;flex-shrink:0}
.recl-empty-txt{font-size:12px;font-weight:500;color:var(--green)}
.recl-grid{display:flex;flex-direction:column;gap:10px}
.recl-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);overflow:hidden}
.recl-card-head{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border-bottom:1px solid var(--border)}
.recl-badge{display:inline-flex;padding:3px 8px;border-radius:6px;font-size:10px;font-weight:700;letter-spacing:0.5px}
.recl-badge.alta{background:var(--rose-lt);color:var(--rose)}
.recl-badge.media{background:var(--amber-lt);color:var(--amber)}
.recl-badge.baixa{background:var(--green-lt);color:var(--green)}
.recl-num{font-family:'Cascadia Code',Consolas,'Courier New',monospace;font-size:10px;color:var(--ink4)}
.recl-card-body{padding:12px 14px}
.recl-nome{font-size:12px;font-weight:600;color:var(--ink2)}
.recl-tel{font-family:'Cascadia Code',Consolas,'Courier New',monospace;font-size:10px;color:var(--ink4);margin-top:2px}
.recl-resumo{font-size:12px;color:var(--ink3);margin-top:6px;line-height:1.5}

/* Melhorias */
.melhoria-list{display:flex;flex-direction:column;gap:12px}
.melhoria-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:14px}
.melhoria-head{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.melhoria-idx{width:24px;height:24px;border-radius:7px;background:var(--amber-lt);border:1px solid rgba(245,166,35,0.2);display:flex;align-items:center;justify-content:center;font-family:'Cascadia Code',Consolas,'Courier New',monospace;font-size:11px;font-weight:700;color:var(--amber);flex-shrink:0}
.melhoria-titulo{font-size:13px;font-weight:600;color:var(--ink2)}
.melhoria-desc{font-size:12px;color:var(--ink3);line-height:1.5;margin-bottom:10px}
.melhoria-exemplos{display:flex;flex-direction:column;gap:8px}
.exemplo-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:10px 12px}
.exemplo-head{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:6px}
.exemplo-cliente{font-size:12px;font-weight:600;color:var(--ink2)}
.exemplo-tel{font-family:'Cascadia Code',Consolas,'Courier New',monospace;font-size:10px;color:var(--ink4);margin-top:1px}
.exemplo-hora{font-family:'Cascadia Code',Consolas,'Courier New',monospace;font-size:10px;color:var(--ink4)}
.exemplo-msg{font-size:12px;color:var(--ink3);font-style:italic;line-height:1.5}
.exemplo-ctx{font-size:11px;color:var(--ink4);margin-top:4px}

/* Observações */
.obs-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:14px}
.obs-txt{font-size:13px;color:var(--ink2);line-height:1.65}

/* Footer */
.report-footer{display:flex;align-items:center;justify-content:space-between;padding:14px 0;border-top:1px solid var(--border);margin-top:4px}
.footer-brand{font-size:11px;color:var(--ink4)}
.footer-brand span{color:var(--ink3);font-weight:500}
.footer-date{font-family:'Cascadia Code',Consolas,'Courier New',monospace;font-size:11px;color:var(--ink4)}

/* Loading / empty states */
.page-loading{display:flex;align-items:center;justify-content:center;gap:6px;padding:60px;color:var(--ink4);font-size:13px}
.ldot{width:6px;height:6px;border-radius:50%;background:var(--green);animation:ldots 1.2s infinite}
.ldot:nth-child(2){animation-delay:0.2s}.ldot:nth-child(3){animation-delay:0.4s}
@keyframes ldots{0%,100%{transform:scale(0.6);opacity:0.3}50%{transform:scale(1);opacity:1}}
.page-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 20px;gap:10px}
.page-empty-icon{font-size:36px;opacity:0.3}
.page-empty-title{font-size:15px;font-weight:600;color:var(--ink3)}
.page-empty-sub{font-size:12px;color:var(--ink4)}

@media(max-width:700px){.exec-grid{grid-template-columns:repeat(2,1fr)};.hor-grid{grid-template-columns:1fr}}

/* ── CURSOR POINTER ── */
.dnavbtn,.today-btn,.itab{ cursor:pointer }
</style>
</head>

<script>
const API = window.location.port === '3001' || window.location.hostname === 'localhost' ? 'http://localhost:3001' : ''
function dHoje() { return new Date().toLocaleDateString('en-CA', { timeZone: 'America/Sao_Paulo' }) }
let dataAtual = dHoje()

function setDateLabel(d) { const [y,m,dia]=d.split('-'); document.getElementById('dlabel').textContent=`${dia}/${m}/${y}`; document.getElementById('dpick').value=d }
function mudarDia(delta) { const dt=new Date(dataAtual+'T12:00:00'); dt.setDate(dt.getDate()+delta); dataAtual=dt.toISOString().split('T')[0]; setDateLabel(dataAtual); carregar() }
function irData(v) { if(!v)return; dataAtual=v; setDateLabel(v); carregar() }
function irHoje() { dataAtual=dHoje(); setDateLabel(dataAtual); carregar() }

async function carregar() {
  const el=document.getElementById('conteudo')
  el.innerHTML=`<div class="page-loading"><div class="ldot"></div><div class="ldot"></div><div class="ldot"></div> Carregando relatório...</div>`
  try {
    const r=await fetch(`${API}/relatorio-ia?data=${dataAtual}`); if(!r.ok)throw new Error()
    renderRelatorio(await r.json())
  } catch {
    el.innerHTML=`<div class="page-empty"><div class="page-empty-icon">📭</div><div class="page-empty-title">Nenhum relatório para este dia</div><div class="page-empty-sub">O relatório é gerado automaticamente às 20h</div></div>`
  }
}

function renderRelatorio(d) {
  const r=d.resumo||{}, h=d.horarios||{}, recl=d.reclamacoes||[], mel=d.pontos_melhoria||[]
  const gravCls=g=>({'ALTA':'alta','MEDIA':'media','BAIXA':'baixa'})[g?.toUpperCase()]||'baixa'

  const secResumo=`<div class="section" style="transition-delay:0ms">
    <div class="section-head"><div style="display:flex;align-items:center"><div class="section-num">01</div><div class="section-title">Resumo Executivo</div></div></div>
    <div class="section-body">
      <div class="exec-grid">
        <div class="exec-card" style="transition-delay:0ms"><div class="exec-card-top">Total</div><div class="exec-card-val">${r.total_conversas||0}</div><div class="exec-card-lbl">conversas no dia</div></div>
        <div class="exec-card fin" style="transition-delay:80ms"><div class="exec-card-top">Finalizadas</div><div class="exec-card-val">${r.finalizadas||0}</div><div class="exec-card-pct">${r.percentual_finalizadas||0}%</div><div class="exec-card-lbl">concluídas</div></div>
        <div class="exec-card and" style="transition-delay:140ms"><div class="exec-card-top">Em andamento</div><div class="exec-card-val">${r.em_andamento||0}</div><div class="exec-card-pct">${r.percentual_em_andamento||0}%</div><div class="exec-card-lbl">em progresso</div></div>
        <div class="exec-card sem" style="transition-delay:200ms"><div class="exec-card-top">Sem resposta</div><div class="exec-card-val">${r.sem_resposta||0}</div><div class="exec-card-pct">${r.percentual_sem_resposta||0}%</div><div class="exec-card-lbl">não atendidas</div></div>
      </div>
      <div class="exec-progress">
        <div class="ep-seg fin" style="width:${r.percentual_finalizadas||0}%"></div>
        <div class="ep-seg and" style="width:${r.percentual_em_andamento||0}%"></div>
        <div class="ep-seg sem" style="width:${r.percentual_sem_resposta||0}%"></div>
      </div>
      <div class="tma-card"><div class="tma-icon">⏱</div><div><div class="tma-val">${r.tma_minutos||0} min</div><div class="tma-lbl">Tempo médio por atendimento</div></div></div>
    </div></div>`

  const secHorarios=`<div class="section" style="transition-delay:80ms">
    <div class="section-head"><div style="display:flex;align-items:center"><div class="section-num">02</div><div class="section-title">Horários de Operação</div></div></div>
    <div class="section-body"><div class="hor-grid">
      <div class="hor-card"><div class="hor-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="8 17 12 21 16 17"/><line x1="12" y1="12" x2="12" y2="21"/><path d="M20.88 18.09A5 5 0 0 0 18 9h-1.26A8 8 0 1 0 3 16.29"/></svg></div><div><div class="hor-lbl">Primeira mensagem recebida</div><div class="hor-time">${h.primeira_msg_cliente_hora||'—'}</div><div class="hor-nome">${h.primeira_msg_cliente_nome||''}</div></div></div>
      <div class="hor-card"><div class="hor-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg></div><div><div class="hor-lbl">Primeira resposta da equipe</div><div class="hor-time">${h.primeira_resposta_hora||'—'}</div></div></div>
      <div class="hor-card"><div class="hor-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="8 17 12 21 16 17"/><line x1="12" y1="12" x2="12" y2="21"/><path d="M20.88 18.09A5 5 0 0 0 18 9h-1.26A8 8 0 1 0 3 16.29"/></svg></div><div><div class="hor-lbl">Última mensagem recebida</div><div class="hor-time">${h.ultima_msg_cliente_hora||'—'}</div><div class="hor-nome">${h.ultima_msg_cliente_nome||''}</div></div></div>
      <div class="hor-card"><div class="hor-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg></div><div><div class="hor-lbl">Última resposta da equipe</div><div class="hor-time">${h.ultima_resposta_hora||'—'}</div></div></div>
    </div></div></div>`

  const secRecl=`<div class="section" style="transition-delay:140ms">
    <div class="section-head"><div style="display:flex;align-items:center"><div class="section-num">03</div><div class="section-title">Reclamações e Críticas</div></div></div>
    <div class="section-body">${recl.length===0
      ?`<div class="recl-empty"><div class="recl-empty-icon">✅</div><div class="recl-empty-txt">Nenhuma reclamação registrada no período</div></div>`
      :`<div class="recl-grid">${recl.map(rc=>`<div class="recl-card"><div class="recl-card-head"><span class="recl-badge ${gravCls(rc.gravidade)}">${rc.gravidade}</span><span class="recl-num">#${rc.numero}</span></div><div class="recl-card-body"><div class="recl-nome">${rc.cliente||'—'}</div><div class="recl-tel">${rc.telefone||''}</div><div class="recl-resumo">${rc.resumo||''}</div></div></div>`).join('')}</div>`}
    </div></div>`

  const secMel=`<div class="section" style="transition-delay:200ms">
    <div class="section-head"><div style="display:flex;align-items:center"><div class="section-num">04</div><div class="section-title">Pontos de Melhoria</div></div></div>
    <div class="section-body">${mel.length===0
      ?`<div class="recl-empty"><div class="recl-empty-icon">✅</div><div class="recl-empty-txt">Atendimento dentro dos padrões de qualidade</div></div>`
      :`<div class="melhoria-list">${mel.map((m,i)=>`<div class="melhoria-card"><div class="melhoria-head"><div class="melhoria-idx">${i+1}</div><div class="melhoria-titulo">${m.titulo||''}</div></div><div class="melhoria-desc">${m.descricao||''}</div><div class="melhoria-exemplos">${(m.exemplos||[]).map(e=>`<div class="exemplo-card"><div class="exemplo-head"><div><div class="exemplo-cliente">${e.cliente||'—'}</div><div class="exemplo-tel">${e.telefone||''}</div></div><div class="exemplo-hora">${e.horario||''}</div></div><div class="exemplo-msg">"${e.mensagem||''}"</div>${e.contexto?`<div class="exemplo-ctx">${e.contexto}</div>`:''}</div>`).join('')}</div></div>`).join('')}</div>`}
    </div></div>`

  const secObs = d.observacoes ? `<div class="section" style="transition-delay:260ms"><div class="section-head"><div style="display:flex;align-items:center"><div class="section-num">05</div><div class="section-title">Observações Gerais</div></div></div><div class="section-body"><div class="obs-card"><div class="obs-txt">${d.observacoes}</div></div></div></div>` : ''

  const footer=`<div class="report-footer"><div class="footer-brand">Relatório gerado por <span>${d.empresa||''}</span></div><div class="footer-date">${dataAtual}</div></div>`

  document.getElementById('conteudo').innerHTML = secResumo+secHorarios+secRecl+secMel+secObs+footer
}

;(function(){
  setDateLabel(dataAtual); carregar()
})()
</script>
