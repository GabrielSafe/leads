<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contatos · Painel de Atendimento</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#f5f2ee; --bg2:#edeae4; --card:#faf9f7; --card2:#f0ede8;
    --border:#e0dbd4; --border2:#c9c3bb; --shadow:0 1px 3px rgba(0,0,0,0.06);
    --ink:#1c1917; --ink2:#44403c; --ink3:#78716c; --ink4:#a8a29e;
    --teal:#0d9488; --teal-lt:#ccfbf1; --teal-mid:#14b8a6;
    --amber:#d97706; --amber-lt:#fef3c7;
    --rose:#be123c; --rose-lt:#ffe4e6;
    --indigo:#4f46e5; --indigo-lt:#e0e7ff;
  }
  .dark {
    --bg:#111110; --bg2:#1a1917; --card:#1c1b19; --card2:#242320;
    --border:#2e2b27; --border2:#3d3a35; --shadow:0 1px 3px rgba(0,0,0,0.3);
    --ink:#f0ece6; --ink2:#d4cfc8; --ink3:#8c8680; --ink4:#5a5550;
    --teal:#2dd4bf; --teal-lt:#0d2e2b; --teal-mid:#14b8a6;
    --amber:#fbbf24; --amber-lt:#1c1500;
    --rose:#fb7185; --rose-lt:#2a0a10;
    --indigo:#818cf8; --indigo-lt:#1e1b4b;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--ink);font-family:'Poppins',sans-serif;min-height:100vh;font-size:14px;transition:background 0.3s,color 0.3s;}

  /* HEADER */
  .header{display:flex;align-items:center;justify-content:space-between;padding:20px 32px;gap:16px;border-bottom:1px solid var(--border);background:var(--bg);}
  .brand-title{font-size:24px;font-weight:700;letter-spacing:-0.6px;color:var(--ink);line-height:1;}
  .brand-title em{font-style:normal;color:var(--teal);}
  .header-right{display:flex;align-items:center;gap:8px;}
  .pill{display:flex;align-items:center;gap:6px;padding:7px 14px;border-radius:100px;background:var(--card);border:1px solid var(--border);box-shadow:var(--shadow);font-size:12px;font-weight:500;color:var(--ink2);}
  .pdot{width:7px;height:7px;border-radius:50%;}
  .pdot.green{background:#22c55e;box-shadow:0 0 0 2px rgba(34,197,94,0.2);}
  .pdot.amber{background:#f59e0b;}
  .icon-btn{width:36px;height:36px;border-radius:10px;background:var(--card);border:1px solid var(--border);box-shadow:var(--shadow);color:var(--ink3);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.2s;}
  .icon-btn:hover{border-color:var(--border2);color:var(--ink);}
  .nav-btn{display:flex;align-items:center;gap:6px;padding:7px 14px;border-radius:100px;background:var(--card);border:1px solid var(--border);box-shadow:var(--shadow);font-size:12px;font-weight:500;color:var(--ink2);text-decoration:none;transition:all 0.2s;cursor:pointer;}
  .nav-btn:hover{border-color:var(--teal-mid);color:var(--teal);}
  .clock{font-family:'JetBrains Mono',monospace;font-size:13px;padding:7px 14px;border-radius:100px;background:var(--card);border:1px solid var(--border);box-shadow:var(--shadow);color:var(--ink3);}

  /* MAIN */
  .main{padding:28px 32px;max-width:1400px;margin:0 auto;}

  /* SEARCH + STATS BAR */
  .topbar{display:flex;align-items:center;justify-content:space-between;gap:16px;margin-bottom:24px;flex-wrap:wrap;}
  .search-wrap{position:relative;flex:1;max-width:360px;}
  .search-wrap svg{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--ink4);pointer-events:none;}
  .search-input{width:100%;padding:9px 12px 9px 36px;border-radius:10px;background:var(--card);border:1px solid var(--border);box-shadow:var(--shadow);font-family:'Poppins',sans-serif;font-size:13px;color:var(--ink);outline:none;transition:border-color 0.2s;}
  .search-input::placeholder{color:var(--ink4);}
  .search-input:focus{border-color:var(--teal-mid);}
  .stats-row{display:flex;align-items:center;gap:8px;}
  .stat-pill{font-family:'JetBrains Mono',monospace;font-size:11px;padding:5px 12px;border-radius:100px;background:var(--card);border:1px solid var(--border);color:var(--ink3);}
  .stat-pill span{color:var(--ink);font-weight:600;}

  /* TABLE */
  .panel{background:var(--card);border:1px solid var(--border);border-radius:16px;box-shadow:var(--shadow);overflow:hidden;}
  .panel-header{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--border);}
  .panel-title{font-size:13px;font-weight:600;color:var(--ink);}
  .panel-sub{font-size:11px;color:var(--ink4);margin-top:2px;}
  .chip{font-family:'JetBrains Mono',monospace;font-size:11px;padding:3px 10px;border-radius:100px;background:var(--bg2);border:1px solid var(--border);color:var(--ink3);}

  table{width:100%;border-collapse:collapse;}
  thead tr{border-bottom:1px solid var(--border);}
  thead th{padding:10px 16px;text-align:left;font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:500;letter-spacing:1px;text-transform:uppercase;color:var(--ink4);white-space:nowrap;}
  tbody tr{border-bottom:1px solid var(--border);transition:background 0.15s;cursor:default;}
  tbody tr:last-child{border-bottom:none;}
  tbody tr:hover{background:var(--card2);}
  td{padding:14px 16px;font-size:13px;color:var(--ink2);vertical-align:middle;}

  .contact-cell{display:flex;align-items:center;gap:12px;}
  .avatar{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:#fff;flex-shrink:0;letter-spacing:-0.5px;}
  .contact-name{font-weight:600;color:var(--ink);font-size:13px;}
  .contact-phone{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--ink4);margin-top:2px;}

  .first-msg{max-width:260px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--ink3);font-size:12px;}
  .date-cell{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--ink3);white-space:nowrap;}
  .msgs-badge{display:inline-flex;align-items:center;justify-content:center;font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:600;padding:4px 10px;border-radius:8px;background:var(--teal-lt);color:var(--teal);min-width:36px;}
  .inst-tag{font-size:11px;padding:3px 9px;border-radius:6px;background:var(--bg2);border:1px solid var(--border);color:var(--ink4);font-family:'JetBrains Mono',monospace;}

  /* EMPTY */
  .empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:64px 24px;gap:12px;}
  .empty-icon{width:48px;height:48px;border-radius:14px;background:var(--bg2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;color:var(--ink4);}
  .empty-txt{font-size:14px;font-weight:500;color:var(--ink3);}
  .empty-sub{font-size:12px;color:var(--ink4);}

  /* PAGINATION */
  .pagination{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;border-top:1px solid var(--border);}
  .page-info{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--ink4);}
  .page-btns{display:flex;gap:4px;}
  .page-btn{width:28px;height:28px;border-radius:7px;background:var(--card);border:1px solid var(--border);color:var(--ink3);cursor:pointer;font-size:12px;display:flex;align-items:center;justify-content:center;transition:all 0.15s;}
  .page-btn:hover{border-color:var(--teal-mid);color:var(--teal);}
  .page-btn:disabled{opacity:0.3;cursor:not-allowed;}

  /* LOADING */
  .loading{display:flex;align-items:center;justify-content:center;padding:48px;gap:10px;color:var(--ink4);font-size:13px;}
  .spinner{width:18px;height:18px;border:2px solid var(--border);border-top-color:var(--teal);border-radius:50%;animation:spin 0.7s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}
  @keyframes fadeIn{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:none;}}
  .ia-badge{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:600;padding:4px 10px;border-radius:8px;}
  .ia-badge.ativa{background:#dcfce7;color:#16a34a;}
  .ia-badge.pausada{background:var(--rose-lt);color:var(--rose);}
  .dark .ia-badge.ativa{background:#052e16;color:#4ade80;}
  .filter-btn{padding:5px 12px;border-radius:100px;background:var(--card);border:1px solid var(--border);font-family:'Poppins',sans-serif;font-size:11px;font-weight:500;color:var(--ink3);cursor:pointer;transition:all 0.15s;}
  .filter-btn:hover{border-color:var(--teal-mid);color:var(--teal);}
  .filter-btn.active{background:var(--teal-lt);border-color:var(--teal-mid);color:var(--teal);font-weight:600;}
  .filter-btn.pausada.active{background:var(--rose-lt);border-color:var(--rose);color:var(--rose);}
  .export-btn{display:flex;align-items:center;gap:6px;padding:7px 14px;border-radius:10px;background:var(--teal-lt);border:1px solid var(--teal-mid);color:var(--teal);font-family:'Poppins',sans-serif;font-size:12px;font-weight:600;cursor:pointer;transition:all 0.2s;}
  .export-btn:hover{background:var(--teal);color:#fff;border-color:var(--teal);}
  tbody tr{animation:fadeIn 0.2s ease both;}
</style>
</head>
<body>

<header class="header">
  <div class="brand-title">Painel de <em>Atendimento</em></div>
  <div class="header-right">
    <div class="pill"><div class="pdot green" id="sdot"></div><span id="stxt">Conectando</span></div>
    <a href="dashboard-leads.html" class="nav-btn">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
      Dashboard
    </a>
    <a href="relatorio-ia.html" class="nav-btn">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
      Relatório IA
    </a>
    <button class="icon-btn" onclick="toggleTheme()" id="themeBtn" title="Alternar tema">
      <svg id="iconMoon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      <svg id="iconSun" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
    </button>
    <div class="clock" id="clock">--:--:--</div>
  </div>
</header>

<main class="main">

  <div class="topbar">
    <div class="search-wrap">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input class="search-input" id="searchInput" type="text" placeholder="Buscar por nome ou telefone..." oninput="filtrar()">
    </div>
    <div class="stats-row">
      <div class="stat-pill">Total <span id="statTotal">—</span></div>
      <div class="stat-pill">IA Ativa <span id="statIASim" style="color:#16a34a">—</span></div>
      <div class="stat-pill">IA Pausada <span id="statIANao" style="color:var(--rose)">—</span></div>
      <button class="filter-btn active" id="filtroTodos" onclick="setFiltroIA('todos')">Todos</button>
      <button class="filter-btn" id="filtroAtiva" onclick="setFiltroIA('ativa')">IA Ativa</button>
      <button class="filter-btn pausada" id="filtroPausada" onclick="setFiltroIA('pausada')">IA Pausada</button>
      <button class="export-btn" onclick="exportarExcel()">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        Exportar Excel
      </button>
    </div>
  </div>

  <div class="panel">
    <div class="panel-header">
      <div>
        <div class="panel-title">Contatos cadastrados</div>
        <div class="panel-sub">todos os contatos que interagiram com o sistema</div>
      </div>
      <span class="chip" id="chipTotal">—</span>
    </div>

    <div id="tableWrap">
      <div class="loading"><div class="spinner"></div> Carregando contatos...</div>
    </div>

    <div class="pagination" id="paginacao" style="display:none">
      <div class="page-info" id="pageInfo"></div>
      <div class="page-btns">
        <button class="page-btn" id="btnPrev" onclick="mudarPagina(-1)">&#8592;</button>
        <button class="page-btn" id="btnNext" onclick="mudarPagina(1)">&#8594;</button>
      </div>
    </div>
  </div>

</main>

<script>
const API = '/api'
const POR_PAGINA = 20
const CORES = ['#0d9488','#d97706','#4f46e5','#be123c','#059669','#7c3aed','#b45309','#0284c7']
const colorMap = {}
let todosContatos = [], filtrados = [], paginaAtual = 1, filtroIA = 'todos'

function dHoje() { return new Date().toISOString().split('T')[0] }

function corContato(tel) {
  if (!colorMap[tel]) colorMap[tel] = CORES[Object.keys(colorMap).length % CORES.length]
  return colorMap[tel]
}

function inicial(nome) {
  if (!nome) return '?'
  return nome.trim().split(' ').map(p => p[0]).slice(0,2).join('').toUpperCase()
}

function fData(ts) {
  if (!ts) return '—'
  const d = new Date(ts)
  return d.toLocaleDateString('pt-BR', {day:'2-digit', month:'2-digit', year:'numeric'})
}

function fHora(ts) {
  if (!ts) return ''
  const d = new Date(ts)
  return d.toLocaleTimeString('pt-BR', {hour:'2-digit', minute:'2-digit'})
}

async function carregar() {
  try {
    const r = await fetch(`${API}/contatos`)
    if (!r.ok) throw new Error()
    const data = await r.json()
    todosContatos = data.contatos || []
    setStatus(true)
    filtrar()
  } catch {
    setStatus(false)
    document.getElementById('tableWrap').innerHTML = `
      <div class="empty-state">
        <div class="empty-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg></div>
        <div class="empty-txt">Não foi possível carregar</div>
        <div class="empty-sub">Verifique a conexão com a API</div>
      </div>`
  }
}

function filtrar() {
  const q = document.getElementById('searchInput').value.toLowerCase().trim()
  let base = filtroIA === 'ativa'
    ? todosContatos.filter(c => !c.ia || c.ia === 'sim')
    : filtroIA === 'pausada'
    ? todosContatos.filter(c => c.ia === 'nao')
    : [...todosContatos]

  filtrados = q
    ? base.filter(c =>
        (c.nome||'').toLowerCase().includes(q) ||
        (c.telefone||'').includes(q)
      )
    : base

  // Ordena pelo primeiro contato mais recente
  filtrados.sort((a,b) => new Date(b.primeiro_contato||0) - new Date(a.primeiro_contato||0))

  paginaAtual = 1
  renderTabela()
}

function renderTabela() {
  const total = filtrados.length
  const totalPags = Math.ceil(total / POR_PAGINA)
  const inicio = (paginaAtual - 1) * POR_PAGINA
  const pagina = filtrados.slice(inicio, inicio + POR_PAGINA)

  // Stats
  const instancias = new Set(todosContatos.map(c => c.instancia).filter(Boolean))
  const iaSim = todosContatos.filter(c => !c.ia || c.ia === 'sim').length
  const iaNao = todosContatos.filter(c => c.ia === 'nao').length
  document.getElementById('statTotal').textContent = todosContatos.length
  document.getElementById('statInst').textContent = instancias.size
  document.getElementById('statIASim').textContent = iaSim
  document.getElementById('statIANao').textContent = iaNao
  document.getElementById('chipTotal').textContent = `${total} contato${total !== 1 ? 's' : ''}`

  if (!pagina.length) {
    document.getElementById('tableWrap').innerHTML = `
      <div class="empty-state">
        <div class="empty-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg></div>
        <div class="empty-txt">Nenhum contato encontrado</div>
        <div class="empty-sub">Tente outro termo de busca</div>
      </div>`
    document.getElementById('paginacao').style.display = 'none'
    return
  }

  document.getElementById('tableWrap').innerHTML = `
    <table>
      <thead>
        <tr>
          <th>Contato</th>
          <th>Primeiro contato</th>
          <th>Primeira mensagem</th>
          <th>Mensagens</th>
          <th>Instância</th>
          <th>IA</th>
        </tr>
      </thead>
      <tbody>
        ${pagina.map(c => {
          const cor = corContato(c.telefone)
          const data = fData(c.primeiro_contato)
          const hora = fHora(c.primeiro_contato)
          const primMsg = c.primeira_mensagem || '—'
          const totalMsgs = c.total_mensagens || 0
          const inst = c.instancia || '—'
          return `<tr>
            <td>
              <div class="contact-cell">
                <div class="avatar" style="background:${cor}">${inicial(c.nome)}</div>
                <div>
                  <div class="contact-name">${c.nome || 'Desconhecido'}</div>
                  <div class="contact-phone">${c.telefone || ''}</div>
                </div>
              </div>
            </td>
            <td>
              <div class="date-cell">${data}</div>
              <div style="font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--ink4);margin-top:2px">${hora}</div>
            </td>
            <td><div class="first-msg" title="${primMsg}">${primMsg}</div></td>
            <td><span class="msgs-badge">${totalMsgs}</span></td>
            <td><span class="inst-tag">${inst}</span></td>
            <td><span class="ia-badge ${c.ia === 'nao' ? 'pausada' : 'ativa'}">${c.ia === 'nao' ? '⏸ Pausada' : '▶ Ativa'}</span></td>
          </tr>`
        }).join('')}
      </tbody>
    </table>`

  // Paginação
  const pag = document.getElementById('paginacao')
  if (totalPags > 1) {
    pag.style.display = 'flex'
    document.getElementById('pageInfo').textContent = `${inicio+1}–${Math.min(inicio+POR_PAGINA, total)} de ${total}`
    document.getElementById('btnPrev').disabled = paginaAtual === 1
    document.getElementById('btnNext').disabled = paginaAtual === totalPags
  } else {
    pag.style.display = 'none'
  }
}

function mudarPagina(delta) {
  paginaAtual += delta
  renderTabela()
  window.scrollTo({top:0, behavior:'smooth'})
}

function setStatus(ok) {
  document.getElementById('sdot').className = `pdot ${ok ? 'green' : 'amber'}`
  document.getElementById('stxt').textContent = ok ? 'Ao vivo' : 'Offline'
}

function toggleTheme() {
  document.body.classList.toggle('dark')
  const d = document.body.classList.contains('dark')
  localStorage.setItem('theme', d ? 'dark' : 'light')
  document.getElementById('iconMoon').style.display = d ? 'none' : 'block'
  document.getElementById('iconSun').style.display  = d ? 'block' : 'none'
}

// INIT
;(function() {
  const t = localStorage.getItem('theme')
  if (t === 'dark') {
    document.body.classList.add('dark')
    document.getElementById('iconMoon').style.display = 'none'
    document.getElementById('iconSun').style.display  = 'block'
  }
  setInterval(() => {
    const el = document.getElementById('clock')
    if (el) el.textContent = new Date().toLocaleTimeString('pt-BR')
  }, 1000)
  carregar()
  setInterval(carregar, 30000)
})()

function setFiltroIA(f) {
  filtroIA = f
  document.getElementById('filtroTodos').classList.toggle('active', f === 'todos')
  document.getElementById('filtroAtiva').classList.toggle('active', f === 'ativa')
  document.getElementById('filtroPausada').classList.toggle('active', f === 'pausada')
  if (todosContatos.length) filtrar()
}

function exportarExcel() {
  if (!filtrados.length) return
  const bom = '\uFEFF'
  const header = ['Nome', 'Telefone', 'Instancia', 'Primeiro Contato', 'Primeira Mensagem', 'Total Mensagens']
  const rows = filtrados.map(c => [
    c.nome || '',
    "'" + (c.telefone || ''),
    c.instancia || '',
    c.primeiro_contato ? new Date(c.primeiro_contato).toLocaleString('pt-BR') : '',
    (c.primeira_mensagem || '').replace(/"/g, '""'),
    c.total_mensagens || 0
  ].map(v => '"' + v + '"').join(';'))
  const csv = bom + [header.join(';'), ...rows].join('\n')
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' })
  const url = URL.createObjectURL(blob)
  const a = document.createElement('a')
  a.href = url
  a.download = 'contatos_' + new Date().toISOString().split('T')[0] + '.csv'
  a.click()
  URL.revokeObjectURL(url)
}
</script>
</body>
</html>
