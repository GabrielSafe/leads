services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    restart: always
    environment:
      - REDIS_HOST=redis_db
      - REDIS_PORT=6379
      - REDIS_PASSWORD=
      - PORT=3001
    ports:
      - "3001:3001"
    networks:
      - leads-net

networks:
  leads-net:
    external: true
