services:

  redis:
    image: redis:7-alpine
    restart: always
    volumes:
      - redis_data:/data
    command: redis-server --requirepass ${REDIS_PASSWORD}

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    restart: always
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - PORT=3001
    depends_on:
      - redis

  dashboard:
    build:
      context: .
      dockerfile: Dockerfile.dashboard
    restart: always
    ports:
      - "80:80"
    depends_on:
      - api

volumes:
  redis_data:
