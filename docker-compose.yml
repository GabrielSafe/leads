services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    restart: always
    environment:
      - REDIS_HOST=${REDIS_HOST}
      - REDIS_PORT=${REDIS_PORT:-6379}
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - PORT=3001
    expose:
      - "3001"
    volumes:
      - leads_data:/app/data
    networks:
      - easypanel

  dashboard:
    build:
      context: .
      dockerfile: Dockerfile.api
    restart: always
    environment:
      - REDIS_HOST=${REDIS_HOST}
      - REDIS_PORT=${REDIS_PORT:-6379}
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - PORT=80
    expose:
      - "80"
    volumes:
      - leads_data:/app/data
    networks:
      - easypanel

volumes:
  leads_data:

networks:
  easypanel:
    external: true
