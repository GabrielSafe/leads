<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chat</title>
<script src="/config.js"></script>
<script>
(function(){
  const cfg = typeof CONFIG !== 'undefined' ? CONFIG : {}
  const link = document.createElement('link'); link.rel = 'icon'
  link.href = cfg.favicon_url || 'data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>' + (cfg.favicon_emoji||'💬') + '</text></svg>'
  document.head.appendChild(link)
  if (cfg.empresa) document.title = cfg.empresa + ' · Chat'
})()
</script>
<link rel="stylesheet" href="shared.css">
<link rel="stylesheet" href="chat.css">
</head>
<body>
<div class="app">

<nav class="sidebar" id="sidebar">
  <div class="sidebar-brand" id="logoArea">
    <div class="sidebar-logo">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
    </div>
    <div><div class="sidebar-brand-name">Atendimento</div><div class="sidebar-brand-slug">Painel</div></div>
  </div>
  <div class="sidebar-nav">
    <div class="nav-section">Principal</div>
    <a href="dashboard-leads.html" class="nav-item">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
      <span>Dashboard</span>
    </a>
    <a href="contatos.html" class="nav-item">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
      <span>Contatos</span>
    </a>
    <div class="nav-section">Análise</div>
    <a href="relatorio-ia.html" class="nav-item">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
      <span>Relatório IA</span>
    </a>
    <a href="chat.html" class="nav-item active">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
      <span>Chat</span>
    </a>
    <div class="nav-section">Config</div>
    <a href="ferramentas.html" class="nav-item">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/></svg>
      <span>Ferramentas</span>
    </a>
  </div>
  <div class="sidebar-footer"><div class="sidebar-ver">Sistema v1.0</div></div>
</nav>
<div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>

<div class="main">
  <div class="topbar">
    <div class="topbar-left">
      <button class="menu-toggle" onclick="toggleSidebar()" id="menuToggle">
        <svg id="menuIconOpen" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        <svg id="menuIconClose" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
      <div class="page-title">Chat</div>
    </div>
    <div class="topbar-right">
      <button class="icon-btn" onclick="toggleTheme()" title="Tema">
        <svg id="iconMoon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        <svg id="iconSun" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
      </button>
      <div class="clock" id="clock">--:--:--</div>
    </div>
  </div>

  <div class="chat-layout">

    <!-- CONTACT LIST -->
    <div class="contact-list" id="contactList">
      <div class="cl-header">
        <div class="cl-title">Conversas</div>
        <div class="cl-search">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input type="text" id="searchInput" placeholder="Buscar contato..." oninput="filtrarContatos()">
        </div>
      </div>
      <div class="cl-filters">
        <button class="cf-btn active" id="fTodos" onclick="setFiltro('todos')">Todos</button>
        <button class="cf-btn pend" id="fPend" onclick="setFiltro('pendente')">Pendentes</button>
        <button class="cf-btn" id="fResp" onclick="setFiltro('respondida')">Respondidas</button>
      </div>
      <div class="cl-body" id="clBody">
        <div class="cl-loading"><div class="cl-spinner"></div> Carregando...</div>
      </div>
    </div>

    <!-- CHAT WINDOW -->
    <div class="chat-window" id="chatWindow">
      <div class="chat-bg-pattern"></div>
      <div class="chat-empty" id="chatEmpty">
        <div class="chat-empty-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
        </div>
        <div class="chat-empty-txt">Selecione uma conversa</div>
        <div class="chat-empty-sub">Escolha um contato para ver o histórico</div>
      </div>
    </div>

  </div>
</div>
</div>

<script src="shared.js"></script>
<script src="chat.js"></script>
<script>
document.addEventListener('DOMContentLoaded', () => {
  if (typeof initPageTransitions === 'function') initPageTransitions()
  initScrollTop()
})
</script>
<button id="scrollTop" aria-label="Voltar ao topo">
  <svg viewBox="0 0 24 24"><polyline points="18 15 12 9 6 15"/></svg>
</button>
<nav class="bottom-nav">

  <a href="relatorio-ia.html" class="bn-item"><svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg><span>Relatório</span></a>
  <a href="chat.html" class="bn-item active"><svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg><span>Chat</span></a>
  <a href="ferramentas.html" class="bn-item"><svg viewBox="0 0 24 24"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/></svg><span>Config</span></a>
</nav>
</body>
</html>
